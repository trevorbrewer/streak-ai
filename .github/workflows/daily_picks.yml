name: Daily Picks Pipeline

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no save or email)?'
        required: false
        default: 'false'
      skip_statcast:
        description: 'Skip Statcast fetch?'
        required: false
        default: 'false'
      date:
        description: 'Date to run for (YYYY-MM-DD, blank = today)'
        required: false
        default: ''

jobs:
  run-picks:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run picks pipeline
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          SENDGRID_API_KEY:    ${{ secrets.SENDGRID_API_KEY }}
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          EMAIL_FROM:          ${{ secrets.EMAIL_FROM }}
          EMAIL_RECIPIENTS:    ${{ secrets.EMAIL_RECIPIENTS }}
          SCORE_THRESHOLD:     ${{ vars.SCORE_THRESHOLD }}
          STREAK_MODE:         ${{ vars.STREAK_MODE }}
        run: |
          echo "Python version:"
          python3 --version
          echo "Working directory:"
          pwd
          echo "Files present:"
          ls -la
          echo "Data folder:"
          ls -la data/
          echo "Testing imports:"
          python3 -c "from src.config import CONFIG; print('config ok')"
          python3 -c "from src.models import Hitter; print('models ok')"
          python3 -c "from src.storage import load_hitters; print('storage ok')"
          python3 -c "from src.pipeline import run_pipeline; print('pipeline ok')"
          echo "Running pipeline:"
          python3 streak_ai.py --run-now --skip-statcast

      - name: Commit updated scores to repo
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "STREAK-AI Bot"
          git add -A data/ || true
          git diff --staged --quiet || git commit -m "data: picks for $(date +'%Y-%m-%d') [skip ci]"
          git push || true

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-run-${{ github.run_id }}
          path: |
            data/scores_history.json
            data/hitters.json
          retention-days: 30
